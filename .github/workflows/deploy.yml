# Deploy automatico su Cloudflare Pages a ogni push.
#
# ⚠️ QUESTO FILE È OPZIONALE.
# Il modo PIÙ SEMPLICE (consigliato) è collegare il repo a Cloudflare Pages
# dalla dashboard (vedi README → "Deploy"): build command `node build.js`,
# output `dist`. In quel caso NON serve questo workflow né alcun segreto.
#
# Usa questo file solo se preferisci gestire il deploy da GitHub Actions.
# Richiede due Secrets nel repo (Settings → Secrets → Actions):
#   CLOUDFLARE_API_TOKEN   (token con permesso "Cloudflare Pages: Edit")
#   CLOUDFLARE_ACCOUNT_ID
# Puoi anche impostare la Repository Variable:
#   CLOUDFLARE_PAGES_PROJECT_NAME
# Se non la imposti, il workflow usa come default: colore-e-verde.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # avvio manuale dal tab "Actions"

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build
        run: node build.js

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'colore-e-verde' }}
